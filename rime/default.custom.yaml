patch:
  schema_list:
    - schema: rime_ice

  menu:
    page_size: 9

  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Caps_Lock: commit_code
      Shift_L: commit_code
      Shift_R: commit_code
      Control_L: noop
      Control_R: noop

  key_binder:
    bindings:
      - { when: always, accept: Control+Shift+space, toggle: full_shape }
      - { when: has_menu, accept: equal, send: Page_Down }
      - { when: has_menu, accept: minus, send: Page_Up }

  switcher:
    save_options:
      - ascii_punct
      - traditionalization
      - emoji
      - search_single_char
